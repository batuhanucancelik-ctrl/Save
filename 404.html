<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sayfa Bulunamadı | Cera Seramik Tozu</title>
    <link rel="icon" type="image/jpeg" href="cera/logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c6a87c;
            --black: #050505;
            --surface: #0d0d0d;
            --border: rgba(198,168,124,0.15);
            --text: #f0ece4;
            --text-muted: #888;
            --gold-grad: linear-gradient(135deg, #bf953f 0%, #fcf6ba 40%, #b38728 70%, #aa771c 100%);
            --soft-curve: cubic-bezier(0.65, 0, 0.35, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--black);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(5,5,5,0.9), rgba(5,5,5,0.95)), url('cera/foto15.jpg') center/cover no-repeat;
            z-index: -2;
        }
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
            opacity: 0.6;
        }
        .gold-text {
            background: var(--gold-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .error-box {
            text-align: center;
            max-width: 440px;
            padding: 50px 40px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            position: relative;
        }
        .error-box::before, .error-box::after {
            content: "";
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: var(--gold);
            border-style: solid;
        }
        .error-box::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .error-box::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
        .error-code {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            font-weight: 300;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 12px;
        }
        .error-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--gold);
            border: 1px solid var(--border);
            background: transparent;
            position: relative;
            overflow: hidden;
            transition: color 0.5s var(--soft-curve), border-color 0.5s var(--soft-curve), box-shadow 0.5s var(--soft-curve);
        }
        .btn-home::before {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--gold-grad);
            transform: translateX(-100%);
            transition: transform 0.5s var(--soft-curve);
            z-index: -1;
        }
        .btn-home:hover {
            color: var(--black);
            border-color: var(--gold);
            box-shadow: 0 0 24px rgba(198,168,124,0.25);
        }
        .btn-home:hover::before { transform: translateX(0); }
        *:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    </style>
</head>
<body>
    <div class="error-box">
        <p class="error-code">404</p>
        <h1 class="error-title gold-text">Sayfa Bulunamadı</h1>
        <p class="error-desc">Aradığınız sayfa mevcut değil veya taşınmış olabilir. Ana sayfaya dönerek devam edebilirsiniz.</p>
        <a href="index.html" class="btn-home" aria-label="Anasayfaya dön">
            <i class="fas fa-home" aria-hidden="true"></i> Anasayfaya Dön
        </a>
    </div>
</body>
</html>
